name = "miami-listing-scout-worker"
main = "src/index.ts"
compatibility_date = "2025-03-01"

[triggers]
crons = ["0 */12 * * *"]  # Every 12h (00:00 and 12:00 UTC) — handler skips based on frequency config

[[kv_namespaces]]
binding = "SCOUT_CONFIG"
id = "265b26f823ff409880db18ce68062b67"

[[kv_namespaces]]
binding = "SEEN_LISTINGS"
id = "def844544b384b9fa489ecfcd42e4cdf"

[vars]
EMAIL_FROM = "scout@yourdomain.com"
MOCK_MODE = "true"

# Set these via `wrangler secret put` for production
# or in .dev.vars for local development:
# BRIDGE_API_TOKEN=
# ANTHROPIC_API_KEY=
# RESEND_API_KEY=
# CONFIG_API_KEY=
